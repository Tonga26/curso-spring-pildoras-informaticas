# ==============================================================================
# SECCIÓN: DICCIONARIO EXTERNO DE MENSAJES DE ERROR
# ==============================================================================
# Este archivo actúa como un repositorio centralizado de textos para la aplicación.
#
# COMPARACIÓN CON JAVA EE (SERVLETS PUROS):
# En la programación Java EE tradicional, los mensajes de error solían estar
# "hardcodeados" (escritos directamente en crudo) dentro del código Java de los
# Servlets. Si querías cambiar un texto, debías recompilar toda la clase .java.
# Al externalizar los mensajes a un archivo .properties, podemos alterar los
# textos de la interfaz sin tocar ni recompilar la lógica de negocio.
# ==============================================================================

# typeMismatch: Es la excepción interna que lanza el WebDataBinder de Spring MVC
# cuando falla el Data Binding por incompatibilidad de tipos (por ejemplo, cuando
# el usuario tipea texto en una caja HTML que debe inyectarse en un atributo 'int').
# .elAlumno: Hace referencia al nombre del ModelAttribute configurado en el controlador.
# .edad: Hace referencia al atributo específico de la clase Java que sufrió el error.
typeMismatch.elAlumno.edad=Valor numérico no válido